groups:
  - name: demo-api-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          sum(rate(app_http_requests_total{status_code=~"5.."}[2m]))
          /
          sum(rate(app_http_requests_total[2m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Demo API error rate is above 5%
          description: More than 5% of requests are returning 5xx responses.

      - alert: HighLatency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(app_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 0.75
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: Demo API p95 latency is high
          description: p95 request latency has been above 750ms for 2 minutes.
